<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/include/header :: header}"></head>
<body>

<div th:replace="~{/include/body-header :: bodyHeader}"></div>

<div class="container">
    <div class="pg-opt">
        <div class="row">
            <div class="col-md-6 pc">
                <h2 th:text="#{home}">홈</h2>
            </div>
            <div class="col-md-6">
                <ol class="breadcrumb">
                    <li th:text="#{home.dashboard}">대시보드</li>
                    <li th:text="#{home}" class="active">홈</li>
                </ol>

                <span th:text="#{lang.change}"></span>:
                <select id="locales">
                    <option value="" th:text="#{lang.select}"></option>
                    <option value="en" th:text="#{lang.eng}"></option>
                    <option value="kr" th:text="#{lang.kor}"></option>
                </select>
            </div>
        </div>
    </div>

    <div class="content">

        <!-- Hero 영역 -->
        <div class="jumbotron text-center">
            <h2 th:text="#{home.message}">환영합니다</h2>
            <p class="text-muted">
                Request 데이터 :
                <span th:text="#{home.message}"></span>
            </p>
        </div>

        <!-- 카드 영역 -->
        <div class="row text-center">

            <div class="col-md-4">
                <div class="panel panel-primary">
                    <div class="panel-heading">게시판</div>
                    <div class="panel-body">
                        <a th:each="cat : ${categoryList}"
                           th:href="@{/board/cat/{id}(id=${cat.categoryId})}"
                           th:text="${cat.categoryName}"
                           class="btn btn-default btn-block">
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="panel panel-success">
                    <div class="panel-heading">
                        <strong>서비스 소개</strong>
                    </div>
                    <div class="panel-body">

                        <p>이 프로젝트는 스프링 부트로 만든 웹 애플리케이션입니다.</p>
                        <p>글 작성, 수정, 파일 업로드 등의 기능을 사용할 수 있습니다.</p>

                        <hr>

                        <a href="https://languid-litter-4b0.notion.site/33789272fad28020830ef2a991591549?source=copy_link"
                           class="btn btn-success btn-block"
                           target="_blank">
                            프로젝트 설명 보러 가기
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="panel panel-info">
                    <div class="panel-heading">이미지</div>
                    <div class="panel-body">
                        <img th:src="@{/images/web.png}" class="img-responsive center-block" style="max-height:150px;">
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<footer th:replace="~{/include/footer :: footer}"></footer>

</body>
</html>
