<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/include/header :: header}"></head>
<body>

<div th:replace="~{/include/body-header :: bodyHeader}"></div>
<body>
<div></div>
<div class="container">
  <div class="pg-opt">
    <div class="row">
      <div class="col-md-6 pc">
        <h2>UPDATE_USER_INFO<small th:text="${message}"></small></h2>
      </div>
      <div class="col-md-6">
        <ol class="breadcrumb">
          <li>MEMBER</li>
          <li class="active">UPDATE USER INFO</li>
        </ol>
      </div>
    </div>
  </div>
  <div class="content">
    <form th:action="@{/member/update}" method="post" class="form-horizontal">
      <div class="form-group">
        <label class="control-label col-sm-2">MEMBER ID</label>
        <div class="col-sm-4">
          <input type="text" name="userid" class="form-control" th:value="${member.userid}" readonly>
        </div>
      </div>
      <div class="form-group">
        <label class="control-label col-sm-2">MEMBER PASSWORD</label>
        <div class="col-sm-4">
          <input type="password" name="password" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="control-label col-sm-2">MEMBER NAME</label>
        <div class="col-sm-4">
          <input type="text" name="name" class="form-control" th:value="${member.name}">
        </div>
      </div>
      <div class="form-group">
        <label class="control-label col-sm-2">MEMBER PHONE</label>
        <div class="col-sm-6">
          <input type="text" name="phone" class="form-control" th:value="${member.phone}">
        </div>
      </div>
      <div class="form-group">
        <label class="control-label col-sm-2">MEMBER EMAIL</label>
        <div class="col-sm-8">
          <input type="text" name="email" class="form-control" th:value="${member.email}">
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-8">
          <input type="submit" class="btn btn-info" value="SAVE">
          <input type="reset" class="btn btn-info" value="CANCEL">
        </div>
      </div>
    </form>
  </div>
</div>
<footer></footer>
</body>
</html>
